server:
  port: 8081
spring:
  application:
    name: qh-dianping
  datasource:
    driver-class-name: ${leading.datasource.driver-class-name}
    url: ${leading.datasource.url}
    username: ${leading.datasource.username}
    password: ${leading.datasource.password}
  data:
    redis:
      host: ${leading.data.redis.host}
      port: ${leading.data.redis.port}
      database: ${leading.data.redis.database}
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s
  profiles:
    active: pri
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
mybatis-plus:
  type-aliases-package: com.qhdp.entity # 别名扫描包
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: ${leading.mybatis-plus.global-config.db-config.logic-delete-field}
      logic-delete-value: ${leading.mybatis-plus.global-config.db-config.logic-delete-value}
      logic-not-delete-value: ${leading.mybatis-plus.global-config.db-config.logic-not-delete-value}
logging:
  level:
    com.hmdp: debug
bloom-filter:
  filters:
    shop:
      name: shop-id-bloom
      expected-insertions: 50000
      false-probability: 0.01
    voucher:
      name: voucher-id-bloom
      expected-insertions: 100000
      false-probability: 0.01